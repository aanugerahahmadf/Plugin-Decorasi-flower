name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Syntax Check (tanpa install deps)
  # Cukup validasi semua file PHP bisa di-parse
  # ─────────────────────────────────────────────
  syntax:
    runs-on: ubuntu-latest
    name: PHP Syntax Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Check PHP Syntax (src/)
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Check PHP Syntax (database/)
        run: find database -name "*.php" -print0 | xargs -0 -n1 php -l

  # ─────────────────────────────────────────────
  # JOB 2: Composer validate
  # Pastikan composer.json valid secara struktur
  # ─────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    name: Validate composer.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

  # ─────────────────────────────────────────────
  # JOB 3: Install dengan Filament 3.x (PHP 8.2)
  # tomatophp/filament-language-switcher ^1.0
  # hanya kompatibel dengan Filament 3.x
  # ─────────────────────────────────────────────
  install-filament3:
    runs-on: ubuntu-latest
    name: Install (Filament 3 + PHP 8.2)
    needs: [syntax, validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-f3-php82-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-f3-php82-

      - name: Install with Filament 3.x
        run: |
          composer config audit.abandoned report
          composer require \
            "filament/filament:^3.3" \
            "filament/spatie-laravel-media-library-plugin:^3.3" \
            "tomatophp/filament-language-switcher:^1.0" \
            --no-update
          composer update \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --with-all-dependencies \
            --ignore-platform-req=ext-pcntl \
            --ignore-platform-req=ext-posix \
            --ignore-platform-req=ext-swoole \
            --ignore-platform-req=php

      - name: Verify autoload
        run: composer dump-autoload --optimize

  # ─────────────────────────────────────────────
  # JOB 4: Auto-tag & Release on push to main
  # ─────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    name: Auto Release
    needs: [syntax, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST=$(git tag --sort=-v:refname | head -n1)
          echo "latest=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          LATEST="${{ steps.get_tag.outputs.latest }}"
          VERSION="${LATEST#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create & push new tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: "Release ${{ steps.bump.outputs.new_tag }}"
          body: |
            ## 🚀 Release ${{ steps.bump.outputs.new_tag }}

            Auto-generated release from commit `${{ github.sha }}`.

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Install
            ```bash
            composer require aanugerah/wedding-pro
            ```
          draft: false
          prerelease: false
